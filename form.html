<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Esportes: História e Atualidade</title>

<link rel="stylesheet" href="styles/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<!-- FORMULÁRIO EM JANELA -->

<div class="modal" id="modalContato">
<div class="modal-content">
<span class="fechar" id="fecharModal">×</span>
<form id="meuForm">
<label>Nome</label><input type="text" required>
<label>Email</label><input type="email" required>
<label>Idade</label><input type="number">
<label>Você acha que a utilização da IA na Educação tem um impacto Positivo ou Negativo?</label><select><option>Positivo</option><option>Negativo</option><option>Neutro</option></select>
<label>Número de Telefone</label><input type="tel">
<label>Senha</label><input type="password">
<label>Cor Favorita</label><input type="color">
<label>Foto de Perfil</label><input type="file" accept="image/*">
<label>Outra mensagem (opcional)</label><textarea rows="4"></textarea>
<button type="submit">Enviar</button>
</form>
</div>
</div>

</head>
</html>
